<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phòng Bi-a Bất Ổn</title>
    <style>
        body { margin: 0; overflow: hidden; } 
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. DỰNG SÂN KHẤU (Scene)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd3d3d3); // Nền xám cho dễ nhìn

        // 2. ĐẶT MÁY QUAY (Camera)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5); // Đặt góc máy cao lên một chút nhìn cho rõ

        // 3. XUẤT HÌNH (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. BẬT ĐÈN (Tăng cường độ sáng lên cho rõ nét)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 8, 5);
        scene.add(directionalLight);

        // 5. THÊM TƯƠNG TÁC CHUỘT
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Trục tọa độ trợ giúp (Đỏ = X, Xanh lá = Y, Xanh dương = Z) để biết model đang nằm đâu
        //const axesHelper = new THREE.AxesHelper(5);
        //scene.add(axesHelper);

        // 5.5. TỰ CHẾ PHÒNG COZY (Rộng 6, Dài 10, Cao 2.5)
        // 1. Tạo bộ tải ảnh nền
        const textureLoader = new THREE.TextureLoader();
        const woodTexture = textureLoader.load('wood.jpg'); // Gọi file ảnh wood.jpg

        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x9b2242, roughness: 0.8 });
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            map: woodTexture, // 3. Thay đổi chất liệu sàn: Đổi từ dùng thuộc tính màu (color) sang thuộc tính ảnh (map)
            roughness: 0.3 // Giảm độ nhám xuống một chút để sàn gỗ có độ bóng nhẹ hắt ánh sáng
        });
        const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0xfcf4d7, roughness: 0.9 }); // Màu trần

        // 2. Cấu hình cho vân gỗ lặp lại (Tiling) để nhìn tự nhiên, không bị kéo giãn bẹp dí
        woodTexture.wrapS = THREE.RepeatWrapping;
        woodTexture.wrapT = THREE.RepeatWrapping;
        woodTexture.repeat.set(3, 3); // Càng tăng số này thì các thanh gỗ càng nhỏ lại và lặp lại nhiều hơn

        // 3. Sàn nhà
        const floorGeo = new THREE.PlaneGeometry(6, 10);
        const floor = new THREE.Mesh(floorGeo, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0; 
        scene.add(floor);

        // 4. Tường sau
        const backWallGeo = new THREE.PlaneGeometry(6, 2.5);
        const backWall = new THREE.Mesh(backWallGeo, wallMaterial);
        // Vì tường cao 2.5 nên phải nâng y lên một nửa (1.25) để đáy tường chạm đúng sàn y = 0
        backWall.position.set(0, 1.25, -5); 
        scene.add(backWall);

        // 5. Tường bên trái
        const leftWallGeo = new THREE.PlaneGeometry(10, 2.5);
        const leftWall = new THREE.Mesh(leftWallGeo, wallMaterial);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-3, 1.25, 0); 
        scene.add(leftWall);

        // 4. Tường trước
        const frontWallGeo = new THREE.PlaneGeometry(6, 2.5);
        const frontWall = new THREE.Mesh(frontWallGeo, wallMaterial);
        frontWall.position.set(0, 1.25, 5);
        frontWall.rotation.y = Math.PI; 
        scene.add(frontWall);

        // 5. Trần nhà
        // ==========================================================================
        // CẬP NHẬT TRẦN THẠCH CAO ĐỔI MÀU KEM/BE CHẠY ĐÈN VIỀN + KHỬ ĐỐM SÁNG THỪA
        // ==========================================================================
        
        // Chất liệu 1: Màu trắng thạch cao cho phần khung xung quanh
        const outerCeilingMat = new THREE.MeshStandardMaterial({ 
            color: 0xefefef, 
            roughness: 0.6 
        });

        // Chất liệu 2: Màu kem cho tấm hình chữ nhật lõm bên trong
        const innerCeilingMat = new THREE.MeshStandardMaterial({ 
            color: 0xeedebf,
            roughness: 0.5 
        });

        // 1. TẤM TRẦN NỀN TRUNG TÂM 
        const topCeilingGeo = new THREE.PlaneGeometry(4, 8);
        const topCeiling = new THREE.Mesh(topCeilingGeo, innerCeilingMat); 
        topCeiling.rotation.x = Math.PI / 2;
        topCeiling.position.set(0, 2.6, 0); 
        scene.add(topCeiling);

        // 2. 4 KHỐI HỘP HẠ CẤP XUNG QUANH RÌA (Giữ màu trắng thạch cao)
        const frameThickness = 0.15;

        // Khung hạ cấp bên Trái
        const leftBox = new THREE.Mesh(new THREE.BoxGeometry(1, frameThickness, 10), outerCeilingMat);
        leftBox.position.set(-2.5, 2.45, 0);
        scene.add(leftBox);

        // Khung hạ cấp bên Phải
        const rightBox = new THREE.Mesh(new THREE.BoxGeometry(1, frameThickness, 10), outerCeilingMat);
        rightBox.position.set(2.5, 2.45, 0);
        scene.add(rightBox);

        // Khung hạ cấp phía Sau
        const backBox = new THREE.Mesh(new THREE.BoxGeometry(4, frameThickness, 1), outerCeilingMat);
        backBox.position.set(0, 2.45, -4.5);
        scene.add(backBox);

        // Khung hạ cấp phía Trước
        const frontBox = new THREE.Mesh(new THREE.BoxGeometry(4, frameThickness, 1), outerCeilingMat);
        frontBox.position.set(0, 2.45, 4.5);
        scene.add(frontBox);

        // tăng sáng viền
        const ledMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff }); 

        const ledLongGeo = new THREE.BoxGeometry(0.02, 0.02, 8);
        const ledShortGeo = new THREE.BoxGeometry(4, 0.02, 0.02);

        const ledLeft = new THREE.Mesh(ledLongGeo, ledMaterial);
        ledLeft.position.set(-1.98, 2.53, 0); 
        scene.add(ledLeft);

        const ledRight = new THREE.Mesh(ledLongGeo, ledMaterial);
        ledRight.position.set(1.98, 2.53, 0); 
        scene.add(ledRight);

        const ledBack = new THREE.Mesh(ledShortGeo, ledMaterial);
        ledBack.position.set(0, 2.53, -3.98); 
        scene.add(ledBack);

        const ledFront = new THREE.Mesh(ledShortGeo, ledMaterial);
        ledFront.position.set(0, 2.53, 3.98); 
        scene.add(ledFront);

       // =================================================================
        // 6. GỌI OBJECT
        // =================================================================
        const loader = new GLTFLoader();

        // --- 6.1. USAGI ---
        loader.load(
            'model.glb', 
            function (gltf) {
                const usagi = gltf.scene;
                usagi.position.set(0, 1, 2); 
                usagi.rotation.y = Math.PI;
                scene.add(usagi);
                console.log("Usagi thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi Usagi: ", error);
            }
        );

        // --- 6.2. LOAD BÀN BI-A ---
        // UPDATE: ĐÃ FIX ĐỔI MÀU & GIẤU GẬY, TẨY MÀU CŨ ---
        loader.load(
            'billiard_table.glb',
            function (gltf) {
                const table = gltf.scene;
                table.position.set(0, 0, 0); 
                table.rotation.y = 3 * Math.PI / 2;

                table.traverse(function (child) {
                    if (child.isMesh) {
                        
                        // Khớp đúng tên mặt bàn 
                        if (child.name === 'Billiards_GreenBoard_Material_#25_0') {
                        
                            child.material.map = null; // Xóa sạch ảnh thảm xanh gốc để không bị trộn màu bẩn
                            child.material.color.setHex(0x00868b); 
                            
                            // Báo cho Three.js biết là vật liệu đã thay đổi kết cấu để nó vẽ lại
                            child.material.needsUpdate = true; 
                        }

                        if (child.name.includes('Billiard_Stick')) {
                            child.visible = false; 
                        }
                    }
                });

                scene.add(table);
                console.log("Bàn thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi bàn:", error);
            }
        );
        // --- 6.3. LOAD CỘT NHÀ KIỂU ÂU VÀ ĐẶT VÀO 4 GÓC PHÒNG (6x10) ---
        loader.load(
            'column.glb', 
            function (gltf) {
                const baseColumn = gltf.scene;

                // Tọa độ 4 góc căn chỉnh cho đẹp
                const cornerPositions = [
                    { x: -2.75, z: -4.9 }, // Góc Sau - Trái
                    { x: 2.75, z: -4.9 },  // Góc Sau - Phải
                    { x: -2.75, z: 4.9 },  // Góc Trước - Trái
                    { x: 2.75, z: 4.9 }    // Góc Trước - Phải
                ];

                cornerPositions.forEach(function(pos) {
                    const columnClone = baseColumn.clone();
                    columnClone.position.set(pos.x, 0, pos.z); 

                    // SỬA LỖI KHỔNG LỒ: Thu nhỏ cái cột lại 
                    columnClone.scale.set(0.3, 0.3, 0.3); 

                    scene.add(columnClone);
                });

                console.log("Cột thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi cột: ", error);
            }
        );
        // --- 6.4. LOAD CHANDELIER VÀ TẠO NGUỒN SÁNG TỎA ---
        loader.load(
            'chandelier.glb',
            function (gltf) {
                const chandelier = gltf.scene;
                chandelier.position.set(0, 2.5, 0);
                chandelier.scale.set(0.03, 0.03, 0.03);

                scene.add(chandelier);

                // Thêm một nguồn sáng PointLight ngay tại tâm chiếc đèn chùm
                const lampLight = new THREE.PointLight(0xffdfa9, 3, 8); 
                lampLight.position.set(0, 2.3, 0); // Đặt thấp hơn trần một chút để ánh sáng tỏa ra đẹp hơn
                
                // Bật đổ bóng cho ngọn đèn
                lampLight.castShadow = true; 
                scene.add(lampLight);

                console.log("Đèn thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi đèn: ", error);
            }
        );
        // ====================================
        // BƯỚC 6.5: TỰ CHẾ GIÁ ĐỂ GẬY BI-A 3D
        // ====================================
        const rackGroup = new THREE.Group();

        // 1. Định nghĩa chất liệu màu sắc
        const rackWoodMat = new THREE.MeshStandardMaterial({ 
            color: 0x2b1810, 
            roughness: 0.5 
        });
        // Màu gỗ sáng cho thân gậy, màu đen cho tay cầm và màu trắng cho đầu cơ
        const cueShaftMat = new THREE.MeshStandardMaterial({ color: 0xe5c298, roughness: 0.4 });
        const cueHandleMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
        const cueTipMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });

        // 2. LẮP RÁP KHUNG GIÁ ĐỠ ĐỨNG
        // Tấm đế nằm sát sàn nhà
        const baseMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.04, 0.18), rackWoodMat);
        baseMesh.position.y = 0.02; // Nâng lên một nửa chiều cao để nằm khít trên sàn y=0
        rackGroup.add(baseMesh);

        // Tấm lưng phẳng dựa thẳng vào vách tường
        const backMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.02), rackWoodMat);
        backMesh.position.set(0, 0.6, -0.08); // Đẩy lùi sát rìa sau của tấm đế
        rackGroup.add(backMesh);

        // Kệ lửng phía trên (thanh có lỗ giữ ngọn gậy)
        const topLipMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.03, 0.12), rackWoodMat);
        topLipMesh.position.set(0, 1.1, -0.03);
        rackGroup.add(topLipMesh);

        // 3. TỰ ĐỘNG CHẾ TẠO 4 CÂY GẬY BI-A XẾP VÀO GIÁ
        // xếp 4 cây gậy dàn hàng ngang đều nhau trên giá đỡ
        const cueSlotsX = [-0.15, -0.05, 0.05, 0.15];

        cueSlotsX.forEach(function(xPos) {
            const singleCue = new THREE.Group();

            // Tham số: (Bán kính đỉnh, Bán kính đáy, Chiều cao, Số mặt cắt)
            const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.012, 1.1, 8), cueShaftMat);
            shaft.position.y = 0.55; // Tâm khối trụ nằm ở giữa vách dọc
            singleCue.add(shaft);

            // Đoạn chuôi bọc da màu đen ở dưới tay cầm (Dài 30cm)
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.011, 0.0122, 0.3, 8), cueHandleMat);
            handle.position.y = 0.15;
            singleCue.add(handle);

            // Đầu ngọn gậy bọc sừng màu trắng tinh khôi ở trên cùng (Cao 3cm)
            const tip = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.0063, 0.03, 8), cueTipMat);
            tip.position.y = 1.115;
            singleCue.add(tip);

            // Đặt cây gậy vừa chế vào đúng khe cắm trên giá đỡ
            singleCue.position.set(xPos, 0.04, -0.03);
            
            // Độ nghiêng ngẫu nhiên
            singleCue.rotation.z = (Math.random() - 0.5) * 0.015;
            singleCue.rotation.x = (Math.random() - 0.5) * 0.015;

            rackGroup.add(singleCue);
        });

        // 4. ĐỊNH VỊ CẢ CỤM GIÁ GẬY ÉP SÁT VÀO VÁCH TƯỜNG 
        rackGroup.position.set(-2.88, 0, 0);
        
        // Xoay góc 90 độ quanh trục Y để quay mặt vào phía trong bàn bi-a
        rackGroup.rotation.y = Math.PI / 2;
        rackGroup.scale.set(1.5, 1.5, 1.5);

        scene.add(rackGroup);

        // =================================
        // BƯỚC 6.6: LOAD SOFA MỚI + ÉP MÀU
        // =================================
        
        // 1. TỰ CHẾ BÀN NHỎ TRÒN GIỮA 2 GHẾ 
        const smallTableGroup = new THREE.Group();
        const tableWoodMat = new THREE.MeshStandardMaterial({ color: 0xc6ac8f, roughness: 0.4 });
        
        const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.03, 32), tableWoodMat);
        tableTop.position.y = 0.45;
        smallTableGroup.add(tableTop);
        
        const tableLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.45, 16), tableWoodMat);
        tableLeg.position.y = 0.225;
        smallTableGroup.add(tableLeg);
        
        const tableBase = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.02, 32), tableWoodMat);
        tableBase.position.y = 0.01;
        smallTableGroup.add(tableBase);

        smallTableGroup.position.set(0, 0, -4.2);
        smallTableGroup.scale.set(1.5, 1.5, 1.5);
        scene.add(smallTableGroup);


        // 2. LOAD FILE SOFA MỚI VÀ TẨY SẠCH MAP GỐC ĐỂ ÉP MÀU
        loader.load(
            'sofa.glb', 
            function (gltf) {
                const baseSofa = gltf.scene;

                // TẨY MAP Y HỆT BÀN BI-A
                baseSofa.traverse(function (child) {
                    if (child.isMesh && child.material) {
                        
                        // BƯỚC 1: Xoá bỏ hoàn toàn ảnh texture xám cũ để không bị trộn màu bẩn
                        child.material.map = null; 
                        
                        // BƯỚC 2: Đổ màu
                        child.material.color.setHex(0xc6747e); 
                        
                        // BƯỚC 3: Cấu hình lại bề mặt cho mịn màng, nhìn giống nỉ thạch cao sang trọng
                        child.material.roughness = 0.5;
                        child.material.metalness = 0.0;
                        
                        // BƯỚC 4: Bắt buộc phải có dòng này để báo Three.js vẽ lại kết cấu mới
                        child.material.needsUpdate = true;
                    }
                });

                // --- GHẾ TẠO BÊN TRÁI BÀN ---
                const leftSofa = baseSofa.clone();
                leftSofa.position.set(-1.5, 0, -4.2);
                leftSofa.rotation.y = 0; 
                leftSofa.scale.set(1.5, 1.5, 1.5); 
                scene.add(leftSofa);

                // --- GHẾ TẠO BÊN PHẢI BÀN ---
                const rightSofa = baseSofa.clone();
                rightSofa.position.set(1.5, 0, -4.2);
                rightSofa.rotation.y = 0; 
                rightSofa.scale.set(1.5, 1.5, 1.5); 
                scene.add(rightSofa);

                console.log("Đã kích hoạt chiêu tẩy map, ghế đã trắng muốt!");
            },
            undefined,
            function (error) {
                console.error("Lỗi load sofa: ", error);
            }
        );
        //======================================
        // BƯỚC 6.7. LOAD TỦ LẠNH VÀO GÓC PHÒNG 
        //======================================
        loader.load(
            'water_fridge.glb',
            function (gltf) {
                const fridge = gltf.scene;
                fridge.position.set(-2.5, 0, -3);
                fridge.rotation.y = 0;
                // fridge.scale.set(1, 1, 1);

                scene.add(fridge);
                console.log("Tủ nước thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi tủ nước: ", error);
            }
        );
        //=========================
        // BƯỚC 6.8. LOAD CHIIKAWA 
        //=========================
        loader.load(
            'chiikawa.glb',
            function (gltf) {
                const chiikawa = gltf.scene;
                chiikawa.position.set(-1.5, 0.77, -1);
                chiikawa.rotation.y = Math.PI / 3; 
                chiikawa.scale.set(0.3, 0.45, 0.4);
                scene.add(chiikawa);
                console.log("Chiikawa đã vào vị trí, đứng cực kỳ thoáng đãng!");
            },
            undefined,
            function (error) {
                console.error("Lỗi không dắt bé Chiikawa vào phòng được sếp ơi: ", error);
            }
        );
        //=====================================================================
        // BƯỚC 6.9: TỦ RƯỢU ÂM TƯỜNG 2D - BỎ QUA ĐÈN PHÒNG (MESHBASICMATERIAL)
        //=====================================================================
        const cabinetTexture = textureLoader.load('wine_cabin.jpg'); 
        const cabinetGeo = new THREE.BoxGeometry(2.6, 2.4, 0.001);
        
        // Sử dụng MeshBasicMaterial để lột bỏ hoàn toàn tác động của đèn scene do ảnh 2d đã có độ phản quang sẵn
        const cabinetMat = new THREE.MeshBasicMaterial({
            map: cabinetTexture
        });

        const wineCabinet2D = new THREE.Mesh(cabinetGeo, cabinetMat);
        wineCabinet2D.position.set(-1.3, 1.2, 4.99);
        wineCabinet2D.rotation.y = Math.PI; 

        scene.add(wineCabinet2D);
        console.log("Đã kích hoạt MeshBasicMaterial, tủ rượu tự tỏa sáng tự nhiên!");

        // =====================================
        // BƯỚC 6.10: TỰ CHẾ CỬA CÁCH ÂM BỌC DA
        // =====================================
        const doorGroup = new THREE.Group();

        // 1. ĐỊNH NGHĨA CHẤT LIỆU
        const frameMat = new THREE.MeshStandardMaterial({ color: 0xe7c8a0, roughness: 0.5 }); // Khung cửa
        const leatherMat = new THREE.MeshStandardMaterial({ color: 0xfaedcd, roughness: 0.85 }); // Đệm da nhám cao
        const buttonMat = new THREE.MeshStandardMaterial({ color: 0xfaedcd, roughness: 0.6 }); // Nút
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 }); // Tay nắm kim loại

        // 2. PHẦN CÁNH CỬA TO (Chữ nhật lớn)
        const doorWidth = 1.0;
        const doorHeight = 2.1;
        const doorThickness = 0.05;

        const doorBase = new THREE.Mesh(new THREE.BoxGeometry(doorWidth, doorHeight, doorThickness), frameMat);
        doorBase.position.y = doorHeight / 2;
        doorGroup.add(doorBase);

        // 3. XẾP MÚI NỆM DA VUÔNG & ĐINH KHUY TRÒN
        const rows = 6; // 6 hàng dọc
        const cols = 3; // 3 hàng ngang
        const panelW = 0.82; // Tổng chiều rộng vùng bọc nệm
        const panelH = 1.85; // Tổng chiều cao vùng bọc nệm
        
        const padW = panelW / cols;
        const padH = panelH / rows;

        // Vòng lặp đắp các miếng đệm da vuông nhô lên mặt cửa
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // Tính tọa độ tâm từng ô vuông
                const xPos = -panelW / 2 + padW / 2 + (c * padW);
                const yPos = (doorHeight - panelH) / 2 + padH / 2 + (r * padH);

                // Trừ đi 0.005 ở kích thước hộp để tạo khe hở đổ bóng giữa các múi da
                const leatherPad = new THREE.Mesh(
                    new THREE.BoxGeometry(padW - 0.005, padH - 0.005, 0.02), 
                    leatherMat
                );
                // Đẩy lồi ra phía trước bề mặt cánh cửa một chút
                leatherPad.position.set(xPos, yPos, doorThickness / 2 + 0.01);
                doorGroup.add(leatherPad);
            }
        }

        // Vòng lặp cắm đinh khuy tròn vào các góc nối giao nhau
        for (let r = 0; r <= rows; r++) {
            for (let c = 0; c <= cols; c++) {
                const xPos = -panelW / 2 + (c * padW);
                const yPos = (doorHeight - panelH) / 2 + (r * padH);

                // Tạo khuy bấm tròn (Hình cầu SphereGeometry)
                const button = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), buttonMat);
                // Cắm khuy lún nhẹ vào khe nối giữa các múi da
                button.position.set(xPos, yPos, doorThickness / 2 + 0.018);
                doorGroup.add(button);
            }
        }

        // 4. TỰ CHẾ TAY NẮM CỬA KIM LOẠI
        const handleGroup = new THREE.Group();
        
        // Tấm ốp khóa chữ nhật dài đằng sau tay nắm
        const plate = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.16, 0.005), handleMat);
        handleGroup.add(plate);

        // Thanh gạt ngang cầm tay (Hình trụ xoay ngang)
        const lever = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.1, 8), handleMat);
        lever.rotation.x = Math.PI / 2; // Xoay ngang ra ngoài
        lever.position.set(0.03, 0.02, 0.02);
        handleGroup.add(lever);

        // Chốt nối vuông gắn thanh gạt vào tấm ốp
        const joint = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.015, 0.02), handleMat);
        joint.position.set(0, 0.02, 0.01);
        handleGroup.add(joint);

        // Đặt tay nắm vào rìa phải cánh cửa, cao vừa tầm tay (Y = 1.0m)
        handleGroup.position.set(0.36, 1.0, doorThickness / 2 + 0.01);
        doorGroup.add(handleGroup);

        doorGroup.position.set(1.3, 0, 4.99);
        doorGroup.rotation.y = -Math.PI;
        scene.add(doorGroup);
        // =========================
        // BƯỚC 6.11: LOAD ĐIỀU HÒA 
        // =========================
        loader.load(
            'air_condition_daikin.glb',
            function (gltf) {
                const airConditioner = gltf.scene;
                airConditioner.position.set(0, 2.1, -4.85);
                airConditioner.rotation.y = 0; 
                // airConditioner.scale.set(1, 1, 1);

                scene.add(airConditioner);
                console.log("Điều hòa thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi điều hòa: ", error);
            }
        );
        //========================
        // BƯỚC 6.12: LOAD TỦ KÉO
        //========================
        loader.load(
            'drawer.glb',
            function (gltf) {
                const drawer = gltf.scene;
                drawer.position.set(-2.8, 0.8, 1.5);
                drawer.scale.set(0.0015,0.0015,0.0015);
                drawer.rotation.y = 0;
                scene.add(drawer);
                console.log("Tủ kéo thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi tủ kéo: ", error);
            }
        );
        //==========================
        // BƯỚC 6.13: LOAD MÔ HÌNH
        //==========================
        loader.load(
            'minecraft.glb',
            function (gltf) {
                const minecraft = gltf.scene;
                minecraft.position.set(-2.4, 0.95, 1.3);
                minecraft.scale.set(0.35,0.35,0.35);
                minecraft.rotation.y = 1.45*Math.PI; 
                scene.add(minecraft);
                console.log("Mô hình thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi mô hình: ", error);
            }
        );
        //=====================
        // BƯỚC 6.14. LOAD CÂY
        //=====================
        loader.load(
            'plant.glb', 
            function (gltf) {
                const plant = gltf.scene;
                plant.position.set(-2.5, 0.5, -2.4);
                plant.rotation.y = 0;
                plant.scale.set(1, 1.2, 1);

                scene.add(plant);
                console.log("Cây thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi cây: ", error);
            }
        );
        //===========================
        // BƯỚC 6.15: LOAD HACHIWARE
        //===========================
        loader.load(
            'hachiware.glb',
            function (gltf) {
                const hachiware = gltf.scene;
                hachiware.position.set(2, 0.73, 4);
                hachiware.rotation.y = Math.PI/2;
                hachiware.scale.set(1.1, 1.5, 1.3);

                scene.add(hachiware);
                console.log("Hachiware thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi Hachiware: ", error);
            }
        );
        // =====================================================
        // BƯỚC 6.16: TREO KHUNG TRANH + DÂN ĐÈ ẢNH 2D LÊN TRÊN 
        // ======================================================
        // 1. Nạp ảnh
        const myPictureTex = textureLoader.load('Thang_Ngot.jpg');
        myPictureTex.flipY = false; 

        // 2. TẠO TẤM ẢNH PHẲNG 2D ĐỂ DÁN ĐÈ
        const photoGeo = new THREE.PlaneGeometry(0.68, 0.9);
        const photoMat = new THREE.MeshBasicMaterial({ 
            map: myPictureTex,
            side: THREE.DoubleSide
        });
        const photoMesh = new THREE.Mesh(photoGeo, photoMat);

        // ĐỊNH VỊ TẤM ẢNH
        photoMesh.position.set(-2.79, 1.5, 3);
        photoMesh.rotation.y = 3*Math.PI/2;
        photoMesh.rotation.z = Math.PI;
        scene.add(photoMesh);

        // 3. LOAD KHUNG TRANH 3D LÀM BỆ ĐỠ PHÍA SAU
        loader.load(
            'picture_frame.glb', 
            function (gltf) {
                const frame = gltf.scene;
                frame.position.set(-2.8, 1.5, 3);
                frame.rotation.y = 0; 
                frame.scale.set(0.7, 0.7, 0.7); 

                scene.add(frame);
                console.log("Tranh thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi khung tranh: ", error);
            }
        );
        //=========================
        // BƯỚC 6.17: LOAD GHẾ ĐẨU
        //=========================
        loader.load(
            'stool.glb',
            function (gltf) {
                const stool = gltf.scene;
                stool.position.set(-2.5, 0, 4.5);
                stool.rotation.y = Math.PI/2;
                stool.scale.set(1, 1, 1);

                scene.add(stool);
                console.log("Ghế đẩu thành công!");
            },
            undefined,
            function (error) {
                console.error("Lỗi ghế đẩu: ", error);
            }
        );
        // ===============================

        // 7. VÒNG LẶP RENDER
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Tự động căn chỉnh khi co giãn trình duyệt
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    
    </script>
</body>
</html>
