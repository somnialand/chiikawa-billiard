<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phòng Bi-a Bất Ổn</title>
    <style>
        body { margin: 0; overflow: hidden; } 
        .control-panel {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(255, 255, 255, 0.85); padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: Arial, sans-serif;
        }
        .control-btn { display: block; width: 100%; margin-bottom: 8px; padding: 8px 12px; background-color: #9b2242; color: white; border: none; border-radius: 4px; cursor: pointer; }
        /* --- CSS CHO BẢNG ĐIỀU KHIỂN ÁNH SÁNG --- */
        .light-control-panel {
            position: fixed;
            top: 20px;
            right: 20px; /* Đặt bên phải màn hình cho đỡ vướng */
            z-index: 100;
            background: rgba(25, 25, 25, 0.85); /* Nền tối ngầu hơn */
            color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
            width: 220px;
        }
        .light-control-panel h3 {
            margin: 0 0 15px 0;
            font-size: 15px;
            color: #ffcc00; /* Tiêu đề màu vàng */
            text-align: center;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }
        .light-control-panel label {
            display: block;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .light-control-panel input[type="range"] {
            width: 100%;
            margin-top: 5px;
            cursor: pointer;
        }
        .light-control-panel input[type="color"] {
            width: 100%;
            height: 35px;
            border: none;
            margin-top: 5px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="name-tag">Name</div>
    <div class="control-panel">
        <h3>ĐIỀU KHIỂN CĂN NHÀ</h3>
        <button class="control-btn" id="btn-overview">Tổng Quan</button>
        <button class="control-btn" id="btn-billiard">Phòng Bi-a</button>
        <button class="control-btn" id="btn-LivingRoom">Phòng Khách</button>
        <button class="control-btn" id="btn-Pool">Bể bơi</button>
    </div>
    <div class="light-control-panel">
        <h3>💡 ĐIỀU CHỈNH ÁNH SÁNG</h3>
        <label>🎨 Màu ánh sáng: 
            <input type="color" id="lightColor" value="#ffffff">
        </label>
        <label>☀️ Cường độ: <span id="valIntensity">2.0</span>
            <input type="range" id="lightIntensity" min="0" max="10" step="0.1" value="2.0">
        </label>
        <label>⬅️ Trục X (Trái/Phải): <span id="valX">5.0</span>
            <input type="range" id="lightX" min="-20" max="20" step="0.5" value="5">
        </label>
        <label>⬆️ Trục Y (Cao/Thấp): <span id="valY">8.0</span>
            <input type="range" id="lightY" min="0" max="30" step="0.5" value="8">
        </label>
        <label>↙️ Trục Z (Sâu/Nông): <span id="valZ">5.0</span>
            <input type="range" id="lightZ" min="-20" max="20" step="0.5" value="5">
        </label>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. BIẾN KIỂM SOÁT ANIMATION (TỪ CODE CỦA BẠN)
        // ==========================================
        let usagiModel = null;
        let chiikawaModel = null;
        let hachiwareModel = null;
        let mikuModel = null;
        let poolWater = null;
        let stoolModel = null;

        let tableGroup = new THREE.Group(); // Gói bàn vào Group để lật
        let customBalls = []; 
        let flipTimer = 0;    
        let tableTopY = 0;
        let sharkModel = null;
        let doraemonModel = null; // Bé doraemon trượt
        let poolGroup = new THREE.Group(); // Nhóm chứa các vật thể bể bơi
        let splashParticles = []; // Hạt nước bắn lên khi Doraemon nhảy xuống
        const usagiBaseY = 0;

        // --- CODE THÊM: HỆ THỐNG RAYCASTER ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const interactables = []; 
        const nameTag = document.getElementById('name-tag');

        // Hàm gắn mác tên và khả năng nhảy cho model
        function makeInteractable(model, englishName, isCharacter = false) {
            if (!model) return;
            model.traverse((child) => {
                if (child.isMesh) {
                    child.userData.enName = englishName;
                    child.userData.isCharacter = isCharacter;
                    child.userData.parentGroup = model; 
                    interactables.push(child); // Đưa vào danh sách bắt tia
                }
            });
            if (isCharacter) {
                model.userData.isJumping = false;
                model.userData.jumpVelocity = 0;
            }
        }

        function resetBalls() {
            if (!customBalls || customBalls.length === 0) return;
            customBalls.forEach(ball => {
                if (ball.userData && ball.userData.startPos) {
                    ball.position.copy(ball.userData.startPos);
                }
                if (ball.userData && ball.userData.velocity) {
                    ball.userData.velocity.set(0, 0, 0);
                }
            });
        }

        function createCustomBalls(tableY) {
            if (!customBalls) customBalls = [];
            if (customBalls.length > 0) return;

            const ballGeo = new THREE.SphereGeometry(0.04, 16, 16);
            const colors = [0xffffff, 0xff0000, 0x0000ff, 0xffff00, 0x00ff00, 0xffa500];
            const positions = [
                new THREE.Vector3(-0.24, tableY + 0.04, -0.08),
                new THREE.Vector3(0.0, tableY + 0.04, -0.02),
                new THREE.Vector3(0.24, tableY + 0.04, -0.08),
                new THREE.Vector3(-0.12, tableY + 0.04, 0.08),
                new THREE.Vector3(0.12, tableY + 0.04, 0.08)
            ];

            positions.forEach((pos, index) => {
                const ballMat = new THREE.MeshStandardMaterial({
                    color: colors[index % colors.length],
                    roughness: 0.4,
                    metalness: 0.3
                });
                const ball = new THREE.Mesh(ballGeo, ballMat);
                ball.position.copy(pos);
                ball.userData = {
                    startPos: pos.clone(),
                    velocity: new THREE.Vector3(0, 0, 0)
                };
                // LƯU Ý QUAN TRỌNG: Đưa bi vào thẳng phòng bi-a để giữ cấu trúc Dollhouse
                billiardRoomGroup.add(ball); 
                customBalls.push(ball);
            });
        }

        // 1. DỰNG SÂN KHẤU (Scene)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd3d3d3); // Nền xám cho dễ nhìn

        // 2. ĐẶT MÁY QUAY
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        // Định nghĩa các góc máy mục tiêu (Vị trí camera và Tâm điểm nhìn vào)
        const cameraViews = {
            overview: {
                position: new THREE.Vector3(10, 2, 5), // Đứng xa ở giữa để nhìn toàn cảnh cả 2 phòng
                target: new THREE.Vector3(-6, 0, 5)   // Nhìn vào tâm điểm giữa 2 phòng
            },
            billiardRoom: {
                position: new THREE.Vector3(5, 2, 0),   // Tiến sát vào phòng bi-a
                target: new THREE.Vector3(-6, 0.5, 0)      // Tập trung vào bàn bi-a
            },
            LivingRoom: {
                position: new THREE.Vector3(5, 2, 12),  // Tiến sát vào phòng mới bên trái
                target: new THREE.Vector3(0, 0.5, 12)     // Tập trung vào phòng mới
            },
            Pool: {
                position: new THREE.Vector3(10, -2, 5.5),  // Đứng thấp xuống để nhìn ngang tầng hầm
                target: new THREE.Vector3(0, -2.5, 5.5)    // Nhìn thẳng vào hồ bơi
            }
        };

        // Đặt góc máy mặc định ban đầu là Tổng quan
        let targetView = cameraViews.overview;
        let isTransitioning = false; // THÊM DÒNG NÀY: Khởi đầu không tự động bay
        camera.position.copy(targetView.position);

        // 3. XUẤT HÌNH (Renderer)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

// =======================================================
        // 4. BẬT ĐÈN & HỆ THỐNG ĐIỀU KHIỂN (UPDATE MỚI)
        // =======================================================
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Giảm Ambient xuống chút để thấy rõ bóng của DirectionalLight
        scene.add(ambientLight);
        
        // Tạo ánh sáng định hướng (như mặt trời)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 8, 5);
        
        // Bật khả năng đổ bóng (Tùy chọn cho đồ họa đẹp hơn)
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -10;
        directionalLight.shadow.camera.right = 10;
        directionalLight.shadow.camera.top = 10;
        directionalLight.shadow.camera.bottom = -10;
        scene.add(directionalLight);

        // Tạo Helper (Khung vuông) để nhìn thấy vị trí bóng đèn đang ở đâu
        const dLightHelper = new THREE.DirectionalLightHelper(directionalLight, 1);
        scene.add(dLightHelper);

        // --- KẾT NỐI UI HTML VỚI ĐÈN THREE.JS ---
        const colorInput = document.getElementById('lightColor');
        const intensityInput = document.getElementById('lightIntensity');
        const xInput = document.getElementById('lightX');
        const yInput = document.getElementById('lightY');
        const zInput = document.getElementById('lightZ');

        // Hàm cập nhật chữ số hiển thị
        const valIntensity = document.getElementById('valIntensity');
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const valZ = document.getElementById('valZ');

        // Đổi màu
        colorInput.addEventListener('input', (e) => {
            directionalLight.color.set(e.target.value);
            dLightHelper.update();
        });

        // Đổi cường độ sáng
        intensityInput.addEventListener('input', (e) => {
            directionalLight.intensity = parseFloat(e.target.value);
            valIntensity.innerText = e.target.value;
        });

        // Đổi hướng chiếu (Thay đổi tọa độ X, Y, Z của đèn)
        function updateLightPosition() {
            const x = parseFloat(xInput.value);
            const y = parseFloat(yInput.value);
            const z = parseFloat(zInput.value);
            
            directionalLight.position.set(x, y, z);
            dLightHelper.update(); // Cập nhật hình ảnh Helper
            
            valX.innerText = x;
            valY.innerText = y;
            valZ.innerText = z;
        }

        xInput.addEventListener('input', updateLightPosition);
        yInput.addEventListener('input', updateLightPosition);
        zInput.addEventListener('input', updateLightPosition);
        // =======================================================

        // 5. THÊM TƯƠNG TÁC CHUỘT
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(-4, 1, 0); 

        // Trục tọa độ trợ giúp (Đỏ = X, Xanh lá = Y, Xanh dương = Z) để bạn biết model đang nằm đâu
        // const axesHelper = new THREE.AxesHelper(5);
        // scene.add(axesHelper);

        // 5.5. TỰ CHẾ PHÒNG BI A (Rộng 6, Dài 10, Cao 2.5)
        const billiardRoomGroup = new THREE.Group();
        scene.add(billiardRoomGroup);
                // 1. Tạo bộ tải ảnh nền
        const textureLoader = new THREE.TextureLoader();
        const woodTexture = textureLoader.load('wood.jpg'); // Gọi file ảnh wood.jpg đứng cạnh index.html

        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x9b2242, roughness: 2.0 });
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            map: woodTexture, 
            roughness: 0.3 // Giảm độ nhám xuống một chút để sàn gỗ có độ bóng nhẹ hắt ánh sáng
        });
        const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0xfcf4d7, roughness: 2.0 }); // Màu trần

        // 2. Cấu hình cho vân gỗ lặp lại (Tiling) để nhìn tự nhiên, không bị kéo giãn bẹp dí
        woodTexture.wrapS = THREE.RepeatWrapping;
        woodTexture.wrapT = THREE.RepeatWrapping;
        woodTexture.repeat.set(3, 3); // Càng tăng số này thì các thanh gỗ càng nhỏ lại và lặp lại nhiều hơn

        // 3. Thay đổi chất liệu sàn: Đổi từ dùng thuộc tính màu (color) sang thuộc tính ảnh (map)

        // 1. Sàn nhà (Thu nhỏ từ 20 xuống 6)
        const floorGeo = new THREE.PlaneGeometry(6, 10);
        const floor = new THREE.Mesh(floorGeo, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0; 
        billiardRoomGroup.add(floor);

        // 2. Tường sau (Rộng 6, Cao 2.5, Dày 0.2)
        const backWallGeo = new THREE.BoxGeometry(6, 2.5, 0.05);
        const backWall = new THREE.Mesh(backWallGeo, wallMaterial);
        // Nâng y=1.25 để chạm sàn. Lùi z=-5.1 để mép trong ốp vừa khít viền sàn
        backWall.position.set(0, 1.25, -5.1); 
        billiardRoomGroup.add(backWall);

        // 3. Tường bên trái (Dài 10, Cao 2.5, Dày 0.2)
        const leftWallGeo = new THREE.BoxGeometry(10, 2.5, 0.05);
        const leftWall = new THREE.Mesh(leftWallGeo, wallMaterial);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-3.1, 1.25, 0); // Đẩy ra rìa trái x=-3.1
        billiardRoomGroup.add(leftWall);

        // 4. Tường trước (Rộng 6, Cao 2.5, Dày 0.2)
        const frontWallGeo = new THREE.BoxGeometry(6, 2.5, 0.05);
        const frontWall = new THREE.Mesh(frontWallGeo, wallMaterial);
        frontWall.position.set(0, 1.25, 5.1); // Đẩy ra rìa trước z=5.1
        // Đã là khối hộp 3D thì không cần lệnh lật mặt (rotation.y = Math.PI) nữa
        billiardRoomGroup.add(frontWall);

        // SỬA TỌA ĐỘ: Đặt đúng rìa sàn (z = 5)
        frontWall.position.set(0, 1.25, 5); 
        
        // SỬA HIỂN THỊ: Xoay 180 độ quanh trục Y để lật mặt đỏ vào trong phòng
        frontWall.rotation.y = Math.PI; 
        
        billiardRoomGroup.add(frontWall);

        // =================================================================
        // CẬP NHẬT: TRẦN GIẬT CẤP ĐỔI MÀU KEM/BE + KHỬ ĐỐM SÁNG + TĂNG SÁNG VIỀN
        // =================================================================
        
        // Chất liệu 1: Màu trắng thạch cao sạch sẽ cho phần khung hạ cấp xung quanh
        const outerCeilingMat = new THREE.MeshStandardMaterial({ 
            color: 0xefefef, 
            roughness: 2.0 
        });

        // Chất liệu 2: MÀU KEM/BE HOÀNG GIA ĐẬM ĐÀ cho tấm hình chữ nhật lõm bên trong
        const innerCeilingMat = new THREE.MeshStandardMaterial({ 
            color: 0xeedebf, // Mã màu kem/be lên đèn cực sang
            roughness: 2.0 
        });

        // 1. TẤM TRẦN NỀN TRUNG TÂM (Đổ khối bê tông dày 0.2m)
        const topCeilingGeo = new THREE.BoxGeometry(6, 0.05, 10);
        const topCeiling = new THREE.Mesh(topCeilingGeo, innerCeilingMat); 
        // Đã là khối hộp nên không cần xoay lật mặt nữa
        topCeiling.position.set(0, 2.6, 0); 
        billiardRoomGroup.add(topCeiling);

        // 2. 4 KHỐI HỘP HẠ CẤP XUNG QUANH RÌA (Giữ màu trắng thạch cao)
        const frameThickness = 0.15;

        // Khung hạ cấp bên Trái
        const leftBox = new THREE.Mesh(new THREE.BoxGeometry(1, frameThickness, 10), outerCeilingMat);
        leftBox.position.set(-2.5, 2.45, 0);
        billiardRoomGroup.add(leftBox);

        // Khung hạ cấp bên Phải
        const rightBox = new THREE.Mesh(new THREE.BoxGeometry(1, frameThickness, 10), outerCeilingMat);
        rightBox.position.set(2.5, 2.45, 0);
        billiardRoomGroup.add(rightBox);

        // Khung hạ cấp phía Sau
        const backBox = new THREE.Mesh(new THREE.BoxGeometry(4, frameThickness, 1), outerCeilingMat);
        backBox.position.set(0, 2.45, -4.5);
        billiardRoomGroup.add(backBox);

        // Khung hạ cấp phía Trước
        const frontBox = new THREE.Mesh(new THREE.BoxGeometry(4, frameThickness, 1), outerCeilingMat);
        frontBox.position.set(0, 2.45, 4.5);
        billiardRoomGroup.add(frontBox);

        // 3. TĂNG SÁNG VIỀN THẠCH CAO (DẢI ĐÈN LED NỔI BẬT)
        // Thay đổi màu từ vàng nhạt sang màu TRẮNG SÁNG TUYỆT ĐỐI (0xffffff) 
        // Vì là MeshBasicMaterial nên nó sẽ tự phát phát quang rực rỡ nhất mà không bị đổ bóng che mờ
        const ledMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff }); 

        const ledLongGeo = new THREE.BoxGeometry(0.02, 0.02, 8);
        const ledShortGeo = new THREE.BoxGeometry(4, 0.02, 0.02);

        const ledLeft = new THREE.Mesh(ledLongGeo, ledMaterial);
        ledLeft.position.set(-1.98, 2.53, 0); 
        billiardRoomGroup.add(ledLeft);

        const ledRight = new THREE.Mesh(ledLongGeo, ledMaterial);
        ledRight.position.set(1.98, 2.53, 0); 
        billiardRoomGroup.add(ledRight);

        const ledBack = new THREE.Mesh(ledShortGeo, ledMaterial);
        ledBack.position.set(0, 2.53, -3.98); 
        billiardRoomGroup.add(ledBack);

        const ledFront = new THREE.Mesh(ledShortGeo, ledMaterial);
        ledFront.position.set(0, 2.53, 3.98); 
        billiardRoomGroup.add(ledFront);

       // =================================================================
        // 6. GỌI DIỄN VIÊN (LOAD CẢ USAGI LẪN BÀN BI-A)
        // =================================================================
        const loader = new GLTFLoader();

       // --- 6.1. LOAD USAGI VÀ GẮN GẬY ---
        loader.load(
            'model.glb', 
            function (gltf) {
                const usagi = gltf.scene;
                
                // ... (Các đoạn tính toán Pivot giữ nguyên như cũ) ...
                const usagiBox = new THREE.Box3().setFromObject(usagi);
                const usagiHeight = usagiBox.max.y - usagiBox.min.y;
                const usagiGroundY = 0.02;
                
                const usagiPivot = new THREE.Group();
                usagi.position.set(0, -usagiBox.min.y, 0);
                usagi.rotation.set(0, Math.PI, 0);
                usagiPivot.add(usagi);
                usagiPivot.position.set(0, usagiGroundY, 2.5);
                usagiPivot.rotation.y = -2 * Math.PI; 

                usagiPivot.userData = { groundY: usagiGroundY, minY: usagiBox.min.y, tableY: tableTopY > 0 ? tableTopY : null, jumpHeight: Math.max(0.9, usagiHeight * 0.8) };
                usagiModel = usagiPivot;
                billiardRoomGroup.add(usagiModel);
                makeInteractable(usagiModel, 'Usagi', true);

                // --- GẮN GẬY THẬT TỪ FILE .glb (ĐẶT ĐÚNG TAY PHẢI) ---
                loader.load('billiard_cue.glb', function(gltfCue) {
                    const cue = gltfCue.scene;
                    
                    // TỌA ĐỘ CẦN CHỈNH:
                    // X = -0.1 (Tay phải), Y = 0.5 (Tầm ngang ngực), Z = 0.2 (Đưa gậy ra trước)
                    cue.position.set(0.6, 0.6, -0.2); 
                    cue.rotation.set(0, Math.PI/2, Math.PI/4); // Xoay dọc gậy
                    
                    // Nếu gậy vẫn to/nhỏ quá, sếp chỉnh số ở đây:
                    cue.scale.set(1, 1, 1); 
                    
                    usagiPivot.add(cue);
                    usagiPivot.userData.cue = cue; 
                    console.log("Đã gắn gậy vào tay phải Usagi!");
                });
            },
            undefined, 
            function (error) {
                console.error("Lỗi tải Usagi: ", error);
            }
        );

   // --- 6.2. LOAD BÀN BI-A ---
loader.load(
    'billiard_table.glb',
    function (gltf) {
        const table = gltf.scene;
        table.position.set(0, 0, 0); 
        table.rotation.y = 3 * Math.PI / 2;

        table.traverse(function (child) {
            if (child.isMesh) {
                // Xử lý mặt bàn xanh
                if (child.name === 'Billiards_GreenBoard_Material_#25_0') {
                    child.material.map = null; 
                    child.material.color.setHex(0x00868b); 
                    child.material.needsUpdate = true; 
                }

                // Ẩn gậy bi-a
                if (child.name.includes('Billiard_Stick')) {
                    child.visible = false; 
                }
            }
        });

        // 1. Đưa bàn bi-a vào không gian
        tableTopY = new THREE.Box3().setFromObject(table).max.y;
        // Gói bàn vào Group để lát Usagi còn lật
        tableGroup.add(table); 
        billiardRoomGroup.add(tableGroup);
        createCustomBalls(tableTopY);
        makeInteractable(tableGroup, 'Billiard Table', false); // false = không nhảy
        resetBalls();

        // =========================================================
        // 2. TẠO TẤM ẢNH GẦM BÀN VÀ GẮN CHẶT VÀO BÀN
        // =========================================================
const bottomGeo = new THREE.PlaneGeometry(2.6, 1.35);

        const agentStates = { chiikawa: { targetIndex: 2, speed: 0.02 } };

        function updateMovement(model, name) {
            if (!model) return; 
            const route = patrolRoutes[name];
            const state = agentStates[name];
            const targetPos = route[state.targetIndex];

            const dx = targetPos.x - model.position.x;
            const dz = targetPos.z - model.position.z;
            const distance = Math.sqrt(dx * dx + dz * dz);

            if (distance < 0.1) {
                state.targetIndex = (state.targetIndex + 1) % route.length;
            } else {
                model.position.x += (dx / distance) * state.speed;
                model.position.z += (dz / distance) * state.speed;
                const targetAngle = Math.atan2(dx, dz); 
                
                let angleDiff = targetAngle - model.rotation.y;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                model.rotation.y += angleDiff * 0.05; 
            }

                usagiModel.rotation.x = 0;
                
            } else if (flipTimer < 160) {
                // GIAI ĐOẠN 2 (120 -> 160): Usagi nhảy phóc lên ghế đẩu
                const jump = (flipTimer - 120) / 40;
                const arc = Math.sin(jump * Math.PI) * 0.5; // Quỹ đạo vòng cung
                
                usagiModel.position.y = uGroundY + arc + (jump * stoolHeight);
                usagiModel.position.z = 1.8; 
                
                // Chiikawa dừng lại và đứng xem
                chiikawaModel.position.y = 0.77;

            } else if (flipTimer < 200) {
                // GIAI ĐOẠN 3 (160 -> 200): Usagi lấy đà nhảy từ ghế đẩu lên mặt bàn
                const jump = (flipTimer - 160) / 40;
                const startY = uGroundY + stoolHeight;
                const heightDiff = uTableY - startY;
                const arc = Math.sin(jump * Math.PI) * 0.4;
                
                usagiModel.position.y = startY + arc + (jump * heightDiff);
                usagiModel.position.z = 1.8 - (jump * 0.9); // Bay từ ghế (Z=1.8) vào mặt bàn (Z=0.9)
                usagiModel.rotation.x = -Math.PI / 12 * jump; // Hơi chúi người về trước tạo đà

            } else if (flipTimer < 240) {
                // GIAI ĐOẠN 4 (200 -> 240): Usagi ngồi xổm tụ lực trên bàn
                usagiModel.position.x = 0; 
                usagiModel.position.y = uTableY + 0.02; 
                usagiModel.position.z = 0.9 + Math.sin(flipTimer * 0.5) * 0.02; // Rung rinh tay

            } else if (flipTimer < 270) {
                // GIAI ĐOẠN 5 (240 -> 270): LẬT BÀN VÀ VĂNG RA SAU
                const progress = (flipTimer - 240) / 30;
                tableGroup.rotation.x = progress * Math.PI / 4;
                usagiModel.rotation.x = (-Math.PI / 8 - (progress * Math.PI / 2)) + 1;

                usagiModel.position.y = uTableY + 0.02 - progress * (uTableY - uGroundY);
                usagiModel.position.z = 0.9 + (progress * 1.0);
                
                // Nổ lực văng bi
                if (flipTimer === 240) {
                    customBalls.forEach(ball => {
                        ball.userData.velocity.set(
                            (Math.random() - 0.5) * 0.05, 
                            0.08 + Math.random() * 0.05,  
                            0.05 + Math.random() * 0.05   
                        );
                    });
                }
            } else if (flipTimer >= 700) {
                // GIAI ĐOẠN 6: TRẢ MỌI THỨ VỀ VỊ TRÍ BAN ĐẦU
                flipTimer = 0;
                tableGroup.rotation.x = 0;
                
                usagiModel.rotation.set(0, -2 * Math.PI, 0); 
                usagiModel.position.set(0, uGroundY, 1.8); 
                
                stoolModel.position.set(-2.5, 0, 4.5); // Trả ghế về góc
                chiikawaModel.position.set(-2.5, 0.77, 4.9); // Trả Chiikawa về sau ghế
                
                resetBalls();
            }

            // --- VẬT LÝ CỦA CÁC VIÊN BI (Chạy độc lập sau khi hất bàn) ---
            if (flipTimer > 240 && flipTimer < 700) {
                customBalls.forEach(ball => {
                    ball.userData.velocity.y -= 0.003; 
                    ball.position.add(ball.userData.velocity);

                    const radius = 0.04;
                    const ceilingHeight = 2.5 - radius; 

                    // Va chạm Y (Sàn và Trần)
                    if (ball.position.y <= radius) { 
                        ball.position.y = radius; 
                        ball.userData.velocity.y *= -0.65; 
                        ball.userData.velocity.x *= 0.98;  
                        ball.userData.velocity.z *= 0.98;
                    } else if (ball.position.y >= ceilingHeight) { 
                        ball.position.y = ceilingHeight;
                        ball.userData.velocity.y *= -0.65; 
                    }

                    // Va chạm X, Z (Bức tường phòng Bi-a)
                    const boundX = 3.0 - radius; 
                    const boundZ = 5.0 - radius; 

                    if (ball.position.x < -boundX) {
                        ball.position.x = -boundX; ball.userData.velocity.x *= -0.8; 
                    } else if (ball.position.x > boundX) {
                        ball.position.x = boundX; ball.userData.velocity.x *= -0.8;
                    }
                    if (ball.position.z < -boundZ) {
                        ball.position.z = -boundZ; ball.userData.velocity.z *= -0.8;
                    } else if (ball.position.z > boundZ) {
                        ball.position.z = boundZ; ball.userData.velocity.z *= -0.8;
                    }
                });
            }
        }
        // --- 1. HIỆU ỨNG SÓNG NƯỚC THẬT (biến dạng đỉnh theo hình sin) ---
        if (poolWater && waterOrigPositions) {
            const wt = Date.now() * 0.0015;
            const pos = poolWater.geometry.attributes.position.array;
            for (let i = 0; i < pos.length; i += 3) {
                const ox = waterOrigPositions[i];
                const oz = waterOrigPositions[i + 2];
                pos[i + 1] = Math.sin(ox * 1.2 + wt) * 0.04
                           + Math.sin(oz * 0.8 + wt * 1.3) * 0.03
                           + Math.sin((ox + oz) * 0.6 + wt * 0.9) * 0.02;
            }
            poolWater.geometry.attributes.position.needsUpdate = true;
            poolWater.geometry.computeVertexNormals();
            poolWater.material.opacity = 0.70 + Math.sin(wt * 2) * 0.05;
        }

        // --- 2. CÁ MẬP BƠI VÒNG QUANH BỂ (ellipse ôm sát hình bể) ---
        if (sharkModel) {
            const st = Date.now() * 0.00035;
            const rx = 1.55, rz = 7.2;
            const cx = 0.5, cz = 0.8;
            const sa = st, na = st + 0.06;
            const sx = cx + Math.cos(sa) * rx;
            const sz = cz + Math.sin(sa) * rz;
            const nx = cx + Math.cos(na) * rx;
            const nz = cz + Math.sin(na) * rz;
            sharkModel.position.set(sx, -0.6, sz);
            const angle = Math.atan2(nx - sx, nz - sz);
            sharkModel.rotation.set(0, angle + Math.sin(st * 10) * 0.08, 0);
        }

        // --- 3. HẠT NƯỚC BẮN LÊN ---
        splashParticles.forEach(drop => {
            if (drop.userData.active) {
                drop.userData.vy -= 0.015;
                drop.position.x += drop.userData.vx;
                drop.position.y += drop.userData.vy;
                drop.position.z += drop.userData.vz;
                drop.material.opacity -= 0.018;
                if (drop.material.opacity <= 0) {
                    drop.visible = false;
                    drop.userData.active = false;
                }
            }
        });

        // --- HIỆU ỨNG SÓNG NƯỚC LẤP LÁNH ---
if (poolWater) {
    const time = Date.now() * 0.002;
    // Làm cho bề mặt nước nhấp nhô nhẹ theo hàm sin
    poolWater.position.y = -0.5 + Math.sin(time) * 0.02; 
    
    // Tạo hiệu ứng lấp lánh bằng cách thay đổi độ trong suốt nhẹ nhàng
    poolWater.material.opacity = 0.8 + Math.sin(time * 2) * 0.05;
}
            renderer.render(scene, camera);
        }
        animate();

        // Tự động căn chỉnh khi co giãn trình duyệt
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        document.getElementById('btn-overview').addEventListener('click', function() {
            targetView = cameraViews.overview;
            isTransitioning = true; // Bật chế độ bay
        });

        document.getElementById('btn-billiard').addEventListener('click', function() {
            targetView = cameraViews.billiardRoom;
            isTransitioning = true; // Bật chế độ bay
        });

        document.getElementById('btn-LivingRoom').addEventListener('click', function() {
            targetView = cameraViews.LivingRoom;
            isTransitioning = true; // Bật chế độ bay
        });

        // Lệnh giúp nút bể bơi hoạt động
        document.getElementById('btn-Pool').addEventListener('click', function() {
            targetView = cameraViews.Pool;
            isTransitioning = true; // Bật chế độ bay xuống tầng hầm
        });

        controls.addEventListener('start', function() {
            isTransitioning = false; 
        });
    </script>
</body>
</html>
